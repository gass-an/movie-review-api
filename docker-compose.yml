services:
  postgres:
    image: postgres:16
    container_name: movie-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: movie_db
      POSTGRES_USER: movie_db
      POSTGRES_PASSWORD: movie_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie_db -d movie_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-review-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_db
      SPRING_DATASOURCE_USERNAME: movie_db
      SPRING_DATASOURCE_PASSWORD: movie_db
    ports:
      - "8080:8080"

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: movie-review-front
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres_data: